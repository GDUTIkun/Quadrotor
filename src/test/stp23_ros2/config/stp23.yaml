stp23_node:
  ros__parameters:
    product_name: "LDLiDAR_STP23"
    port_name: "auto"
    baudrate: 921600
    hardware_flow_control: false
    frame_id: "lidar_frame"
    point_topic: "stp23"
    distance_topic: "/ldlidar_distance"
    range_topic: "/stp23/range"
    scan_topic: "scan"
    publish_scan: true
    publish_point: true
    publish_range: true
    scan_angle_increment_deg: 1.0
    range_min: 0.02
    range_max: 25.0
    log_points: false
